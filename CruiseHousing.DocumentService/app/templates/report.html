<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
	 <style>
	  @page { size: A4; margin: 12mm; }

	  body {
		font-family: "Noto Sans CJK JP", "IPAexGothic", sans-serif;
		font-size: 12px;
	  }

	  table {
		width: 100%;
		border-collapse: collapse;
	  }

	  th, td {
		border: 1px solid #000;
		padding: 6px;
	  }
	</style>
</head>
<body>
  <h1>{{ title }}</h1>
  <table>
    <tr>
      <th>項目1</th>
      <th>金額</th>
    </tr>
    {% for item in items %}
    <tr>
      <td>{{ item.name }}</td>
      <td>{{ item.amount }}</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
